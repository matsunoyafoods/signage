<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>店舗サイネージ プレイヤー</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,"Segoe UI","Noto Sans JP",sans-serif;color:#fff}
  #stage{position:fixed;inset:0;background:#000}
  .slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s ease}
  #empty{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    text-align:center;color:#666;font-size:4vh;padding:6vh;line-height:1.6}
  #start{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:#0b1220;text-align:center;padding:8vh}
  #start h1{font-size:5vh;margin-bottom:2vh}
  #start p{font-size:2.4vh;color:#9fb0c8;line-height:1.7;margin-bottom:4vh}
  #startBtn{font-size:3vh;font-weight:700;color:#0b1220;background:#34d399;
    border:0;border-radius:999px;padding:2.2vh 6vh;cursor:pointer}
  #badge{position:fixed;left:1.5vh;bottom:1.5vh;z-index:15;font-size:1.6vh;
    background:rgba(0,0,0,.45);color:#cbd5e1;padding:.6vh 1.4vh;border-radius:1vh;
    font-variant-numeric:tabular-nums;opacity:0;transition:opacity .3s}
  #stage.debug #badge{opacity:1}
  #err{position:fixed;top:1.5vh;left:1.5vh;right:1.5vh;z-index:16;display:none;
    background:rgba(220,38,38,.85);color:#fff;font-size:1.8vh;padding:1.2vh 1.6vh;border-radius:1vh}
</style>
</head>
<body>
<div id="stage">
  <img id="slideA" class="slide" alt="">
  <img id="slideB" class="slide" alt="">
  <div id="empty">現在の時間帯に表示する画像がありません<br><span style="font-size:2.6vh">管理ページから追加してください</span></div>
  <div id="err"></div>
  <div id="badge">--</div>
</div>

<div id="start">
  <h1>🖥️ サイネージ プレイヤー</h1>
  <p id="startInfo">設定を読み込んでいます…</p>
  <button id="startBtn" style="display:none">画面をタップして開始</button>
</div>

<script>
"use strict";
(function(){
  function getParam(k){ try{ return new URLSearchParams(location.search).get(k); }catch(e){ return null; } }
  var SRC = getParam("src") || "./config.json";
  var DEBUG = getParam("debug")==="1";
  var CACHE_KEY = "signage_player_cache_v1";

  var cfg = null, cfgStr = "";
  var playModeId = null, slideIdx = 0, countdown = 0, frontIsA = true;
  var started = false, wakeLock = null, pollAcc = 0;
  var audioEl = null, musicTracks = [], musicIdx = 0, musicStr = "";

  var $ = function(id){ return document.getElementById(id); };
  var slideA=$("slideA"), slideB=$("slideB"), stage=$("stage");
  if(DEBUG) stage.classList.add("debug");

  function toMin(t){ var a=(t||"0:0").split(":"); return (parseInt(a[0],10)||0)*60+(parseInt(a[1],10)||0); }
  function inRange(now,s,e){ if(s===e)return false; return s<e ? (now>=s&&now<e) : (now>=s||now<e); }

  /* ---- 日本の祝日 自動判定 ---- */
  var _holCache = {};
  function nthMonday(year,month,n){ var d=new Date(year,month-1,1); var day=d.getDay(); var first=1+((8-day)%7); return first+(n-1)*7; }
  function vernalEq(year){ return Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4)); }
  function autumnEq(year){ return Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4)); }
  function computeHolidays(year){
    var base={}; function add(m,d){ base[m+"-"+d]=true; }
    add(1,1); add(1,nthMonday(year,1,2)); add(2,11);
    if(year>=2020){ add(2,23); } else if(year<=2018){ add(12,23); }
    add(3,vernalEq(year));
    add(4,29); add(5,3); add(5,4); add(5,5);
    add(7,nthMonday(year,7,3));
    if(year>=2016) add(8,11);
    add(9,nthMonday(year,9,3)); add(9,autumnEq(year));
    add(10,nthMonday(year,10,2));
    add(11,3); add(11,23);
    var res={}; for(var k in base) res[k]=true;
    function isBase(m,d){ return !!base[m+"-"+d]; }
    // 国民の休日（前後が祝日で日曜以外）
    var dd=new Date(year,0,1), end=new Date(year,11,31);
    while(dd<=end){ var m=dd.getMonth()+1,day=dd.getDate();
      if(!isBase(m,day)&&dd.getDay()!==0){
        var pv=new Date(year,dd.getMonth(),day-1), nx=new Date(year,dd.getMonth(),day+1);
        if(isBase(pv.getMonth()+1,pv.getDate())&&isBase(nx.getMonth()+1,nx.getDate())) res[m+"-"+day]=true;
      }
      dd=new Date(year,dd.getMonth(),day+1);
    }
    // 振替休日（祝日が日曜なら次の非祝日）
    dd=new Date(year,0,1);
    while(dd<=end){ var m2=dd.getMonth()+1,day2=dd.getDate();
      if(res[m2+"-"+day2]&&dd.getDay()===0){
        var n2=new Date(year,dd.getMonth(),day2+1);
        while(res[(n2.getMonth()+1)+"-"+n2.getDate()]) n2=new Date(n2.getFullYear(),n2.getMonth(),n2.getDate()+1);
        res[(n2.getMonth()+1)+"-"+n2.getDate()]=true;
      }
      dd=new Date(year,dd.getMonth(),day2+1);
    }
    return res;
  }
  function isNationalHoliday(d){
    var y=d.getFullYear();
    if(!_holCache[y]) _holCache[y]=computeHolidays(y);
    return !!_holCache[y][(d.getMonth()+1)+"-"+d.getDate()];
  }
  function pad2(n){ return (n<10?"0":"")+n; }
  function isExtraHoliday(d){
    if(!cfg||!cfg.extraHolidays) return false;
    var full=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
    var md=pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
    return cfg.extraHolidays.indexOf(full)>=0 || cfg.extraHolidays.indexOf(md)>=0;
  }
  function dayType(d){ // "holiday"(土日祝) or "weekday"(平日)
    var wd=d.getDay();
    if(wd===0||wd===6||isNationalHoliday(d)||isExtraHoliday(d)) return "holiday";
    return "weekday";
  }
  function dayMatch(m,d){ var dsel=m.days||"all"; return dsel==="all" || dsel===dayType(d); }

  /* 設定を正規化：新形式(modes配列) と 旧形式(lunch/dinner) の両対応 */
  function normalize(c){
    c = c || {};
    function mode(m, i){
      m = m || {};
      return {
        id: m.id || ("mode"+i),
        name: m.name || ("モード"+(i+1)),
        start: m.start || "00:00",
        end: m.end || "00:00",
        sec: Math.max(1, parseInt(m.sec,10)||5),
        days: (m.days==="weekday"||m.days==="holiday") ? m.days : "all",
        images: Array.isArray(m.images) ? m.images.filter(function(x){return typeof x==="string"&&x;}) : []
      };
    }
    var modes;
    if(Array.isArray(c.modes)){
      modes = c.modes.map(mode);
    }else{
      // 旧形式の後方互換
      modes = [];
      if(c.lunch){ var l=mode(c.lunch,0); l.id="lunch"; l.name=c.lunch.name||"ランチ"; modes.push(l); }
      if(c.dinner){ var d=mode(c.dinner,1); d.id="dinner"; d.name=c.dinner.name||"ディナー"; modes.push(d); }
    }
    var mus = c.music || {};
    var music = {
      volume: (function(){ var v=parseFloat(mus.volume); return isNaN(v)?0.7:Math.max(0,Math.min(1,v)); })(),
      tracks: Array.isArray(mus.tracks) ? mus.tracks.filter(function(x){return typeof x==="string"&&x;}) : []
    };
    var extra = Array.isArray(c.extraHolidays) ? c.extraHolidays.filter(function(x){return typeof x==="string"&&x;}) : [];
    return { pollSec: Math.max(5, parseInt(c.pollSec,10)||30), music: music, extraHolidays: extra, modes: modes };
  }
  function currentMode(d){
    if(!cfg) return null;
    var now = d.getHours()*60 + d.getMinutes();
    for(var i=0;i<cfg.modes.length;i++){
      var m=cfg.modes[i];
      if(dayMatch(m,d) && inRange(now, toMin(m.start), toMin(m.end))) return m;
    }
    return null;
  }
  function modeById(id){
    if(!cfg||id==null) return null;
    for(var i=0;i<cfg.modes.length;i++){ if(cfg.modes[i].id===id) return cfg.modes[i]; }
    return null;
  }

  function showErr(msg){ var e=$("err"); if(!msg){e.style.display="none";return;} e.textContent=msg; e.style.display="block"; }

  function applyConfig(raw, fromCache){
    var next = normalize(raw);
    var s = JSON.stringify(next);
    if(s === cfgStr) return;
    cfgStr = s; cfg = next;
    if(!fromCache){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify(raw)); }catch(e){} }
    refreshPlayback(currentMode(new Date()), true);
    applyMusic(cfg.music);
  }

  /* ---- BGM（共通プレイリスト） ---- */
  function applyMusic(mus){
    mus = mus || {volume:0.7, tracks:[]};
    if(!audioEl){ audioEl = new Audio(); audioEl.preload="auto";
      audioEl.addEventListener("ended", function(){ musicNext(); });
      audioEl.addEventListener("error", function(){ setTimeout(musicNext, 1500); });
    }
    audioEl.volume = mus.volume;
    var key = JSON.stringify(mus.tracks);
    if(key !== musicStr){
      musicStr = key; musicTracks = mus.tracks.slice(); musicIdx = 0;
      if(started) startMusic();
    }
  }
  function startMusic(){
    if(!audioEl || musicTracks.length===0) return;
    if(musicIdx>=musicTracks.length) musicIdx=0;
    audioEl.src = musicTracks[musicIdx];
    var p = audioEl.play();
    if(p && p.catch) p.catch(function(){});
  }
  function musicNext(){
    if(!audioEl || musicTracks.length===0) return;
    musicIdx = (musicIdx+1) % musicTracks.length;
    audioEl.src = musicTracks[musicIdx];
    var p = audioEl.play();
    if(p && p.catch) p.catch(function(){});
  }
  function fetchConfig(){
    var url = SRC + (SRC.indexOf("?")>=0?"&":"?") + "_t=" + Date.now();
    fetch(url, {cache:"no-store"}).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    }).then(function(json){
      showErr(""); applyConfig(json, false); afterFirstLoad();
    }).catch(function(e){
      if(!cfg){
        var cached=null; try{ cached=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); }catch(_){}
        if(cached){ applyConfig(cached, true); afterFirstLoad(); showErr("オフライン: 前回の設定で表示中"); }
        else { $("startInfo").textContent = "設定を取得できません: "+SRC+"（"+e.message+"）"; }
      }else{ showErr("更新に失敗（前回の設定を継続）: "+e.message); }
    });
  }
  function afterFirstLoad(){
    if(started) return;
    $("startInfo").textContent = "設定を読み込みました。画面をタップすると全画面で再生を開始します。";
    $("startBtn").style.display = "inline-block";
  }

  function showImage(src){
    var incoming = frontIsA ? slideB : slideA;
    var outgoing = frontIsA ? slideA : slideB;
    incoming.onload = function(){ incoming.style.opacity="1"; outgoing.style.opacity="0"; };
    incoming.onerror= function(){ incoming.style.opacity="1"; outgoing.style.opacity="0"; };
    incoming.src = src;
    if(incoming.complete && incoming.naturalWidth>0){ incoming.style.opacity="1"; outgoing.style.opacity="0"; }
    frontIsA = !frontIsA;
  }
  function clearSlides(){ slideA.style.opacity="0"; slideB.style.opacity="0"; slideA.removeAttribute("src"); slideB.removeAttribute("src"); }

  function refreshPlayback(mode, force){
    var id = mode ? mode.id : null;
    if(id!==playModeId || force){ playModeId=id; slideIdx=0; }
    var imgs = mode ? mode.images : [];
    if(!mode || imgs.length===0){ $("empty").style.display="flex"; clearSlides(); countdown=0; return; }
    $("empty").style.display="none";
    if(slideIdx>=imgs.length) slideIdx=0;
    showImage(imgs[slideIdx]);
    countdown = mode.sec;
  }
  function nextSlide(){
    var mode = modeById(playModeId); if(!mode) return;
    var imgs=mode.images; if(imgs.length===0) return;
    slideIdx=(slideIdx+1)%imgs.length;
    showImage(imgs[slideIdx]);
    countdown = mode.sec;
  }

  function tick(){
    var d = new Date();
    if(!cfg) return;
    var mode = currentMode(d);
    if((mode?mode.id:null)!==playModeId) refreshPlayback(mode, true);
    var active = modeById(playModeId);
    if(active && active.images.length>0){
      countdown--;
      if(countdown<=0) nextSlide();
    }
    var hh=String(d.getHours()).padStart(2,"0"),mm=String(d.getMinutes()).padStart(2,"0"),ss=String(d.getSeconds()).padStart(2,"0");
    var dt = dayType(d)==="holiday" ? "土日祝" : "平日";
    $("badge").textContent = hh+":"+mm+":"+ss+" ("+dt+") / "+(mode?mode.name:"待機")+" / 次:"+(active&&countdown>0?countdown+"s":"--");
    pollAcc++;
    if(pollAcc >= cfg.pollSec){ pollAcc=0; fetchConfig(); }
  }

  function goFullscreen(){
    var el=document.documentElement;
    try{ if(el.requestFullscreen) el.requestFullscreen().catch(function(){}); else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen(); }catch(e){}
  }
  function requestWake(){
    try{ if("wakeLock" in navigator){ navigator.wakeLock.request("screen").then(function(w){ wakeLock=w; }).catch(function(){}); } }catch(e){}
  }
  document.addEventListener("visibilitychange", function(){ if(!document.hidden){ if(cfg) tick(); requestWake(); } });

  function startPlayback(){
    if(started) return; started = true;
    $("start").style.display = "none";
    goFullscreen(); requestWake();
    refreshPlayback(currentMode(new Date()), true);
    startMusic();
  }

  $("startBtn").addEventListener("click", startPlayback);
  $("start").addEventListener("click", function(){ if($("startBtn").style.display!=="none") startPlayback(); });
  stage.addEventListener("click", function(){ if(started) nextSlide(); });

  fetchConfig();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
